<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">OF CHARLOTTE</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <a class="header-logo" href="index.html" id="shop-name">OF CHARLOTTE</a>
  <div class="header-nav">
    <a href="admin.html">ADMIN</a>
  </div>
</header>

<div class="hero">
  <div class="hero-sub">Exclusive Collection</div>
  <h2>Timeless Elegance</h2>
  <div class="hero-line"></div>
</div>

<main>
  <div class="section-title">
    <h2>New Arrivals</h2>
    <div class="line"></div>
  </div>
  <div id="content">
    <div class="loading">
      <div class="spinner"></div>
      <p>Loading...</p>
    </div>
  </div>
</main>

<footer>
  <span id="footer-name">OF CHARLOTTE</span> &nbsp;·&nbsp; All rights reserved
</footer>

<div id="toast"></div>

<script src="js/config.js"></script>
<script>
document.querySelector('#shop-name').textContent = SHOP_NAME;
document.querySelector('#footer-name').textContent = SHOP_NAME;
document.querySelector('#page-title').textContent = SHOP_NAME;

async function loadProducts() {
  try {
    const res = await fetch(`${API_URL}?action=getProducts`);
    const data = await res.json();
    renderProducts(data.products || []);
  } catch (e) {
    document.getElementById('content').innerHTML =
      '<div class="empty"><p>상품을 불러오지 못했습니다.</p></div>';
  }
}

function renderProducts(products) {
  const el = document.getElementById('content');
  if (!products.length) {
    el.innerHTML = '<div class="empty"><p>등록된 상품이 없습니다.</p></div>';
    return;
  }
  const now = new Date();
  el.innerHTML = `<div class="product-grid">${products.map(p => {
    const deadline = new Date(p.deadline);
    const closed = deadline < now;
    const deadlineStr = `${deadline.getMonth()+1}.${deadline.getDate()} ${deadline.getHours()}:${String(deadline.getMinutes()).padStart(2,'0')} 마감`;
    return `
      <a class="product-card" href="product.html?id=${p.id}">
        <div class="card-img">
          <img src="${p.image || ''}" onerror="this.style.background='#f0ece6'" alt="${p.title}">
          <span class="card-badge ${closed ? 'badge-closed' : 'badge-open'}">${closed ? 'Closed' : 'Open'}</span>
        </div>
        <div class="card-body">
          <h3>${p.title}</h3>
          ${p.price ? `<div class="price">₩ ${Number(p.price).toLocaleString()}</div>` : ''}
          <div class="deadline">⏰ ${deadlineStr}</div>
        </div>
      </a>`;
  }).join('')}</div>`;
}

loadProducts();
</script>
</body>
</html>
